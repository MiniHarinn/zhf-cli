name: Generate Data

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        # Caches Nix store paths between runs — avoids re-downloading the
        # nixpkgs tarball on every workflow run when the commit hasn't changed.

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build generator
        run: cargo build --release -p zhf-generator

      - name: Run generator
        run: ./target/release/zhf-generator
        env:
          ZHF_MAINTAINER_CONCURRENCY: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
