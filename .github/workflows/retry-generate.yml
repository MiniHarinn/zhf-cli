name: Retry Generate Data

on:
  workflow_run:
    workflows: ["Generate Data"]
    types: [completed]

jobs:
  retry:
    if: >-
      contains(fromJSON('["failure","cancelled","timed_out"]'), github.event.workflow_run.conclusion) &&
      github.event.workflow_run.event == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-dispatch Generate Data
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run generate-data.yml --repo "$GITHUB_REPOSITORY"
